[phases.setup]
aptPkgs = ["libcairo2-dev", "pkg-config", "python3-dev", "libgirepository1.0-dev"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = [
    "python manage.py collectstatic --noinput",
    "python manage.py migrate"
]

[start]
cmd = "gunicorn bmakb.wsgi:application"