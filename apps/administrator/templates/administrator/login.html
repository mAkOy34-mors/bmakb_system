<!-- templates/administrator/login.html -->
{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — BMAKB System</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="{% static 'administrator/css/login.css' %}">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-brand">
    <h1>BMAKB</h1>
    <p>Membership Management System</p>
  </div>

  <div class="auth-card">
    <div class="auth-title">Welcome back</div>
    <div class="auth-sub">Sign in to your administrator account</div>

    {% for message in messages %}
    <div class="alert alert-danger mb-3">{{ message }}</div>
    {% endfor %}

    <form method="POST">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus/>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="Enter password" required/>
        </div>
      </div>

      <button type="submit" class="btn-auth">
        <i class="bi bi-box-arrow-in-right me-2"></i> Sign In
      </button>
    </form>

    <div class="auth-link">
      Don't have an account? <a href="{% url 'administrator:register' %}">Register here</a>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
